<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Review Sentiment Analysis</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8fafc;
            text-align: center;
            padding: 50px;
        }
        textarea {
            width: 70%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 25px;
            background-color: #0078d4;
            color: white;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #005a9e;
        }
        .result {
            margin-top: 25px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>🎬 Movie Review Sentiment Analysis (BiLSTM)</h1>
    <form action="/predict" method="post">
        <textarea name="review_text" placeholder="Enter your movie review here..." required>{{ review_text or '' }}</textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
        <div class="result">
            <strong>Prediction:</strong> {{ prediction }}
        </div>
    {% endif %}
</body>
</html>
